[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = ["python -m ensurepip --upgrade", "python -m pip install --upgrade pip", "python -m pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["echo python-service build step skipped"]

[start]
cmd = "PYTHONWARNINGS=ignore::DeprecationWarning python app.py"
