[phases.setup]
nixPkgs = ["nodejs_22", "pkg-config", "cairo", "pango", "libpng", "libjpeg", "giflib", "librsvg", "pixman", "python311", "gcc", "gnumake"]

[phases.install]
cmds = ["npm cache clean --force", "rm -rf node_modules apps/api/node_modules apps/web/node_modules", "npm install --include=optional --no-audit"]

[phases.build]
cmds = ["npm run prisma:generate -w apps/api", "npm run build -w apps/api", "if [ -d python-service ]; then PY_ROOT=python-service; else PY_ROOT=.; fi; python3 -m venv $PY_ROOT/.venv", "if [ -d python-service ]; then PY_ROOT=python-service; else PY_ROOT=.; fi; $PY_ROOT/.venv/bin/python -m pip install --upgrade pip", "if [ -d python-service ]; then PY_ROOT=python-service; else PY_ROOT=.; fi; $PY_ROOT/.venv/bin/python -m pip install --no-cache-dir -r $PY_ROOT/requirements.txt"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
