    <style>
      @page { size: A4 landscape; margin: 0; }
      html, body { margin: 0; padding: 0; font-family: Arial, sans-serif; color: #111; font-size: 0; line-height: 0; }

      /* A4 landscape: 297mm × 210mm — two portrait halves side by side */
      .sheet {
        width: 297mm;
        height: 210mm;
        display: flex;
        flex-direction: row;
        page-break-after: always;
        overflow: hidden;
        font-size: 0;
        line-height: 0;
      }
      .sheet:last-child { page-break-after: auto; }

      /* Each half is a portrait MO: 148.5mm × 210mm */
      .half {
        width: 148.5mm;
        height: 210mm;
        position: relative;
        background: #fff;
        overflow: hidden;
        flex-shrink: 0;
      }

      /* Duplex correction for short-edge flip: rotate back half only */
      .half.back {
        transform: rotate(180deg);
        transform-origin: center center;
      }

      /* Background fills the entire portrait half */
      .bg {
        position: absolute;
        inset: 0;
        z-index: 1;
        background-repeat: no-repeat;
        background-position: center center;
        background-size: 100% 100%;
        transform: none;
      }

      /* Overlay anchored to top-left of the half — EXTENDED FULL HEIGHT to prevent tracking ID clipping */
      .overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      .field {
        position: absolute;
        z-index: 5;
        line-height: 1;
        white-space: nowrap;
        overflow: visible;
      }
      .mono   { font-family: "Courier New", Courier, monospace; letter-spacing: 0.18mm; font-weight: 700; }
      .regular { font-weight: 500; }
      .strong  { font-weight: 700; }
      .urdu { direction: rtl; text-align: right; font-weight: 700; }
      .en { direction: ltr; text-align: left; }
      .barcode { position: absolute; z-index: 5; object-fit: contain; }

      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
